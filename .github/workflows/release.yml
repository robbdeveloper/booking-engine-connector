# Build an installable plugin ZIP and attach it to the GitHub Release for tag pushes
# or manual workflow runs. Sites use the bundled Plugin Update Checker to download
# this asset (see includes/Core/PluginUpdater.php).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (without v prefix, e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin zip
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          ROOT="${GITHUB_WORKSPACE}"
          PARENT="$(dirname "${ROOT}")"
          REPO_NAME="$(basename "${ROOT}")"
          mkdir -p "${ROOT}/dist"
          cd "${PARENT}"
          zip -r "${ROOT}/dist/booking-engine-connector-${VERSION}.zip" "${REPO_NAME}" \
            -x "${REPO_NAME}/.git/*" \
            -x "${REPO_NAME}/dist/*"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          files: dist/booking-engine-connector-*.zip
          generate_release_notes: true
