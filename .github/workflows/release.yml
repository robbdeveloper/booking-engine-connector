# Build an installable plugin ZIP and attach it to the GitHub Release for tag pushes.
# Sites use the bundled Plugin Update Checker to download this asset (see includes/Core/PluginUpdater.php).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ROOT="${GITHUB_WORKSPACE}"
          PARENT="$(dirname "${ROOT}")"
          REPO_NAME="$(basename "${ROOT}")"
          mkdir -p "${ROOT}/dist"
          cd "${PARENT}"
          zip -r "${ROOT}/dist/booking-engine-connector-${VERSION}.zip" "${REPO_NAME}" \
            -x "${REPO_NAME}/.git/*" \
            -x "${REPO_NAME}/dist/*"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/booking-engine-connector-*.zip
          generate_release_notes: true
